name: CI — Lint → Test → Deploy

on:
  push:
    branches: ["main", "develop", "feature/*"]
  pull_request:
    branches: ["main", "develop"]

# ─── WORKFLOW STRATEGY ─────────────────────────────────────────────────────────
# Branch strategy:
#   feature/* → runs lint + unit tests
#   develop   → runs lint + all tests + coverage report
#   main      → runs everything + deploys to Railway/Render

jobs:
  # ────────────────────────────────────────────────────────────────
  lint:
    name: "🔍 Ruff Lint & Format Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ruff
        run: pip install "ruff>=0.4.0"

      - name: Ruff — check linting
        run: ruff check . --output-format=github

      - name: Ruff — check formatting
        run: ruff format . --check

  # ────────────────────────────────────────────────────────────────
  test:
    name: "🧪 Pytest (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run unit tests with coverage
        run: |
          pytest tests/ \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=75 \
            -v

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ────────────────────────────────────────────────────────────────
  security:
    name: "🔐 Security Scan (Bandit)"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit security scan
        run: |
          bandit -r . \
            --exclude ./tests,./ui \
            --skip B101,B603 \
            --severity-level medium

  # ────────────────────────────────────────────────────────────────
  docker-build:
    name: "🐳 Docker Build Verification"
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t excel-auto-analyst:ci .

      - name: Verify container starts
        run: |
          docker run -d \
            --name test-container \
            -p 8501:8501 \
            -e GROQ_API_KEY=test_key_for_ci \
            excel-auto-analyst:ci
          sleep 5
          docker logs test-container
          docker stop test-container

  # ────────────────────────────────────────────────────────────────
  deploy-staging:
    name: "🚀 Deploy → Staging (develop branch)"
    runs-on: ubuntu-latest
    needs: [test, security, docker-build]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway (Staging)
        run: |
          npm install -g @railway/cli
          railway up --service excel-auto-analyst-staging
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}

  # ────────────────────────────────────────────────────────────────
  deploy-production:
    name: "🎯 Deploy → Production (main branch)"
    runs-on: ubuntu-latest
    needs: [test, security, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway (Production)
        run: |
          npm install -g @railway/cli
          railway up --service excel-auto-analyst-prod
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PROD }}

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Production deployment complete at $(date)"
          # Add Slack/email notification here if needed
